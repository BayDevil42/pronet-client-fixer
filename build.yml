name: Build ProNet Client Fixer EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Kodu Al
      uses: actions/checkout@v4

    - name: Python Kur
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: PyInstaller Kur
      run: pip install pyinstaller

    - name: EXE Derle
      run: |
        pyinstaller `
          --onefile `
          --windowed `
          --name "ProNet Client Fixer v01" `
          --hidden-import=winreg `
          --hidden-import=ctypes `
          --hidden-import=tkinter `
          --hidden-import=tkinter.ttk `
          --hidden-import=tkinter.filedialog `
          --hidden-import=tkinter.messagebox `
          --hidden-import=tkinter.scrolledtext `
          --uac-admin `
          pronet_client_fixer.py

    - name: EXE'yi Yükle (Artifact)
      uses: actions/upload-artifact@v4
      with:
        name: ProNet-Client-Fixer-v01
        path: dist/ProNet Client Fixer v01.exe
        retention-days: 30

    - name: Release Oluştur
      uses: softprops/action-gh-release@v2
      if: github.ref == 'refs/heads/main'
      with:
        tag_name: v0.1
        name: ProNet Client Fixer v.01
        body: |
          ## ProNet Client Fixer v.01
          
          Tek tıkla çalışır, hiçbir kurulum gerekmez.
          
          ### Özellikler
          - Windows Defender dışlama yönetimi
          - DEP (Veri Yürütme Engellemesi) kapatma
          - VC++, DirectX bağımlılık kontrolü
          - Silkroad client dosya tarama
          - WebView2 yeniden kurma
          - Güvenlik duvarı kural yönetimi
          - Ağ gecikme testi
        files: dist/ProNet Client Fixer v01.exe
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
