name: Build ProNet Client Fixer EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Kodu Al
      uses: actions/checkout@v4

    - name: Python Kur
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: PyInstaller ve Bağımlılıklar Kur
      run: pip install pyinstaller pyautogui pywin32 pywin32-ctypes

    - name: EXE Derle
      run: |
        pyinstaller `
          --onefile `
          --windowed `
          --name "ProNet Client Fixer v02" `
          --hidden-import=winreg `
          --hidden-import=ctypes `
          --hidden-import=tkinter `
          --hidden-import=tkinter.ttk `
          --hidden-import=tkinter.filedialog `
          --hidden-import=tkinter.messagebox `
          --hidden-import=tkinter.scrolledtext `
          --hidden-import=pyautogui `
          --hidden-import=win32gui `
          --hidden-import=win32con `
          --hidden-import=win32api `
          --hidden-import=win32process `
          --hidden-import=pywintypes `
          --hidden-import=win32com.client `
          --uac-admin `
          pronet_client_fixer.py

    - name: EXE Artifact Yukle
      uses: actions/upload-artifact@v4
      with:
        name: ProNet-Client-Fixer-v02
        path: "dist/ProNet Client Fixer v02.exe"
        retention-days: 90

    - name: Release Olustur
      uses: softprops/action-gh-release@v2
      with:
        tag_name: "v0.2.${{ github.run_number }}"
        name: "ProNet Client Fixer v.02"
        body: |
          ## ProNet Client Fixer v.02
          
          **Yeni Özellikler:**
          - Türkçe / İngilizce dil desteği
          - Karanlık / Aydınlık tema
          - Canlı ping monitörü (gerçek zamanlı grafik)
          - Sunucu durumu kontrolü (online/offline)
          - Otomatik oyun başlatıcı (ön kontrol ile)
          - Profil kaydetme / yükleme
          - Ayarlar otomatik kaydedilir
          
          Tek tıkla çalışır, hiçbir kurulum gerekmez.
        files: "dist/ProNet Client Fixer v02.exe"
        draft: false
        prerelease: false
