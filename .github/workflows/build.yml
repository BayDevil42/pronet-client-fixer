name: Build ProNet Client Fixer EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Kodu Al
      uses: actions/checkout@v4

    - name: Python Kur
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: PyInstaller Kur
      run: pip install pyinstaller

    - name: EXE Derle
      run: |
        pyinstaller `
          --onefile `
          --windowed `
          --name "ProNet Client Fixer v01" `
          --hidden-import=winreg `
          --hidden-import=ctypes `
          --hidden-import=tkinter `
          --hidden-import=tkinter.ttk `
          --hidden-import=tkinter.filedialog `
          --hidden-import=tkinter.messagebox `
          --hidden-import=tkinter.scrolledtext `
          --uac-admin `
          pronet_client_fixer.py

    - name: EXE Artifact Yukle
      uses: actions/upload-artifact@v4
      with:
        name: ProNet-Client-Fixer-v01
        path: "dist/ProNet Client Fixer v01.exe"
        retention-days: 90

    - name: Release Olustur
      uses: softprops/action-gh-release@v2
      with:
        tag_name: "v0.1.${{ github.run_number }}"
        name: "ProNet Client Fixer v.01"
        body: "Tek tikla calisir, hicbir kurulum gerekmez. Indir, cift tikla, yonetici onayi ver, kullan."
        files: "dist/ProNet Client Fixer v01.exe"
        draft: false
        prerelease: false
